<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
--primary: #0066ff; --primary-dark: #0052cc;
--gradient: linear-gradient(135deg, #0066ff 0%, #0052cc 100%);

html { scroll-behavior: smooth; }
body { font-family: 'Inter', sans-serif; background: var(--darker); color: white; overflow-x: hidden; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }

.navbar { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: calc(100% - 40px); max-width: 1400px; }
.navbar-inner { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-radius: 16px; padding: 14px 40px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }

.nav-links { display: flex; gap: 32px; align-items: center; }
.nav-links a { text-decoration: none; color: #1a1a1a; font-weight: 500; font-size: 14px; transition: color 0.3s; }
.nav-cta { background: var(--gradient); color: white !important; padding: 10px 24px; border-radius: 10px; font-weight: 600; }

.error-section { flex: 1; display: flex; align-items: center; justify-content: center; padding: 160px 20px 80px; position: relative; overflow: hidden; }
.error-section::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 20% 50%, rgba(0,102,255,0.15) 0%, transparent 50%), radial-gradient(circle at 80% 50%, rgba(236,72,153,0.1) 0%, transparent 50%); pointer-events: none; }
.error-content { text-align: center; max-width: 700px; position: relative; z-index: 2; }
.error-code { font-size: clamp(100px, 20vw, 200px); font-weight: 900; line-height: 1; letter-spacing: -0.05em; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 20px; }
.error-title { font-size: clamp(28px, 5vw, 48px); font-weight: 800; margin-bottom: 16px; letter-spacing: -0.02em; }
.error-desc { font-size: 18px; color: rgba(255,255,255,0.7); margin-bottom: 40px; line-height: 1.7; }
.error-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.btn-primary { display: inline-flex; align-items: center; gap: 10px; padding: 16px 32px; background: var(--gradient); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.3s; }
.btn-primary:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(0,102,255,0.4); }
.btn-secondary { display: inline-flex; align-items: center; gap: 10px; padding: 16px 32px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.3s; backdrop-filter: blur(10px); }
.btn-secondary:hover { background: rgba(255,255,255,0.2); transform: translateY(-3px); }
.error-illustration { margin-top: 60px; font-size: 80px; opacity: 0.3; }

@media (max-width: 768px) {
.nav-links { display: none; }
.error-actions { flex-direction: column; }
.btn-primary, .btn-secondary { width: 100%; justify-content: center; }
}
</style>
